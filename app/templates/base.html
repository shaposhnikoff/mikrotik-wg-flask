<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}MikroTik WireGuard Config Generator{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js"></script>
  <style>
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline; }
    .htmx-request.htmx-indicator { display: inline; }
    pre.routeros-config {
      white-space: pre-wrap;
      word-break: break-all;
      font-size: 0.78rem;
      background: #f5f5f5;
      padding: 1rem;
      border-radius: 4px;
      max-height: 420px;
      overflow-y: auto;
    }
    .client-conf-pre {
      white-space: pre-wrap;
      word-break: break-all;
      font-size: 0.78rem;
      max-height: 260px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <nav class="navbar is-dark" role="navigation">
    <div class="navbar-brand">
      <a class="navbar-item has-text-weight-bold" href="/">MikroTik WireGuard Generator</a>
    </div>
    <div class="navbar-menu">
      <div class="navbar-end">
        <a class="navbar-item" href="/">Generate</a>
        <a class="navbar-item" href="/configs">Saved Configs</a>
      </div>
    </div>
  </nav>

  <section class="section">
    <div class="container is-fluid">
      {% block content %}{% endblock %}
    </div>
  </section>
</body>
</html>
